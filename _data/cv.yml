    发表论文:
      - title: What makes a good order of examples in in-context learning
        authors:
          - Guo, Qi and Wang, Leiyu and Wang, Yidong and Ye, Wei and Zhang, Shikun
        publisher: ACL Findings
        releaseDate: 2024
        url: https://aclanthology.org/2024.findings-acl.884/
        summary: 上下文学习对少样本示例的顺序高度敏感，但现有的顺序启发式方法通常依赖额外的域内（往往是无标签）数据，且仍难以捕捉实例间的差异。我们从语料级和实例级两个层面分析了何种示例顺序能带来更优性能，并提出了 **DEmO** 方法——该方法无需额外数据，即可为每个测试实例自适应地选择强顺序。DEmO 首先通过**标签公平性**筛选候选顺序，然后利用一种**无内容度量**为每个实例挑选最具影响力的顺序，在多个强基准上取得了显著提升，并能够良好地泛化至不同设置。

